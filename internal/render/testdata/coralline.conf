# Test config for the render golden test. Mirrors the user's real coralline.conf
# structure (pill, catppuccin-mocha, three fixed lines) but pins limit-sync and
# usage-state off so the golden is a pure function of the input JSON.

# Theme: catppuccin-mocha
. "$_VL_DIR/themes/catppuccin-mocha.conf"

VL_STYLE="pill"
VL_LAYOUT="fixed"
VL_MAX_LINES=3
VL_COLS=0

VL_SEGMENTS="ctx git"
VL_SEGMENTS2="dir model effort"
VL_SEGMENTS3="limit5h limit7d burn"

VL_CTX_TOKENS=0
VL_CLOCK="off"

VL_WARN_PCT=50
VL_HOT_PCT=80

VL_LIMIT_SYNC=0
VL_USAGE_STATE=0
